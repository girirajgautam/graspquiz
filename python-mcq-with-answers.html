<script>
  (function () {
    const data = [
      { q: "Which keyword defines a function?", a: "`def`", e: "Functions in Python start with `def`, then function name and parentheses.", x: "def greet():\n    print(\"Hello\")\ngreet()  # Hello" },
      { q: "Python is interpreted or compiled?", a: "Interpreted", e: "Python code is executed by the interpreter at runtime.", x: "print(\"Python runs via interpreter\")" },
      { q: "Which type is immutable?", a: "`tuple`", e: "Immutable means values cannot be changed after creation.", x: "t = (1, 2, 3)\n# t[0] = 9  -> TypeError" },
      { q: "Which symbol starts a comment?", a: "`#`", e: "Everything after `#` on that line is ignored by Python.", x: "# this is a comment\nx = 10" },
      { q: "Which function gets input?", a: "`input()`", e: "It reads user input as a string.", x: "name = input(\"Enter name: \")\nprint(name)" },
      { q: "What does `len()` return?", a: "Number of elements", e: "`len()` gives size of string, list, tuple, dict, etc.", x: "print(len([10, 20, 30]))  # 3" },
      { q: "Which keyword handles exceptions?", a: "`except`", e: "Use `try` and `except` to catch runtime errors safely.", x: "try:\n    1/0\nexcept ZeroDivisionError:\n    print(\"Error handled\")" },
      { q: "Dictionary keys must be?", a: "Hashable", e: "Keys must be immutable/hashable types like string, int, tuple.", x: "d = {\"name\": \"Ram\", 1: \"one\"}" },
      { q: "Which operator is exponent?", a: "`**`", e: "Use `**` for power operations.", x: "print(2 ** 3)  # 8" },
      { q: "Which data type stores key-value pairs?", a: "`dict`", e: "Dictionary maps keys to values.", x: "student = {\"name\": \"A\", \"marks\": 95}" },
      { q: "What does `range(5)` produce?", a: "0 to 4", e: "`range(5)` generates numbers from 0 up to (not including) 5.", x: "print(list(range(5)))  # [0, 1, 2, 3, 4]" },
      { q: "What is list slicing syntax?", a: "`[start:stop:step]`", e: "Slicing extracts part of a list/string.", x: "nums = [0,1,2,3,4]\nprint(nums[1:4])  # [1,2,3]" },
      { q: "What does `append()` do?", a: "Adds one item at end", e: "Use `append` to insert a single new element at the end.", x: "a = [1,2]\na.append(3)\nprint(a)  # [1,2,3]" },
      { q: "What is `None` in Python?", a: "Null-like singleton object", e: "`None` means no value / empty state.", x: "x = None\nprint(x is None)  # True" },
      { q: "Which module gives math functions?", a: "`math`", e: "`math` provides sqrt, ceil, floor, pi, etc.", x: "import math\nprint(math.sqrt(16))  # 4.0" },
      { q: "What is correct package installer?", a: "`pip`", e: "`pip` installs Python libraries.", x: "pip install requests" },
      { q: "Which statement creates set?", a: "`set()` or `{1,2}`", e: "Set stores unique unordered elements.", x: "s = {1,2,2,3}\nprint(s)  # {1,2,3}" },
      { q: "What does `pass` do?", a: "No operation placeholder", e: "`pass` keeps syntax valid when block is intentionally empty.", x: "def todo():\n    pass" },
      { q: "What does `break` do?", a: "Exits loop", e: "`break` stops the nearest loop immediately.", x: "for i in range(5):\n    if i == 3:\n        break\n    print(i)  # 0 1 2" },
      { q: "What does `continue` do?", a: "Skips current iteration", e: "`continue` skips current loop turn and moves next.", x: "for i in range(5):\n    if i == 2:\n        continue\n    print(i)  # 0 1 3 4" }
    ];

    const wrap = document.getElementById("pythonMcqFaq");
    if (!wrap) return;

    data.forEach((item, i) => {
      const card = document.createElement("article");
      card.className = "faq-card";

      const q = document.createElement("div");
      q.className = "faq-question";
      q.textContent = (i + 1) + ". " + item.q;

      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "faq-toggle";
      btn.textContent = "Show";
      btn.setAttribute("aria-expanded", "false");

      const ans = document.createElement("div");
      ans.className = "faq-answer";
      ans.innerHTML =
        '<div class="faq-block"><div class="faq-label">Answer</div><p>' + item.a + '</p></div>' +
        '<div class="faq-block"><div class="faq-label">Explanation</div><p>' + item.e + '</p></div>' +
        '<div class="faq-block"><div class="faq-label">Example</div><p><code>' + item.x.replace(/\n/g, "<br>") + '</code></p></div>';

      btn.addEventListener("click", function () {
        const open = ans.classList.toggle("visible");
        btn.setAttribute("aria-expanded", String(open));
        btn.textContent = open ? "Hide" : "Show";
      });

      card.appendChild(q);
      card.appendChild(btn);
      card.appendChild(ans);
      wrap.appendChild(card);
    });
  })();
</script>
